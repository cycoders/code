[tool.poetry]
name = "route-extractor-cli"
version = "0.1.0"
description = "Statically extracts HTTP routes from Python web frameworks"
authors = ["Arya Sianati <arya@cycoders.com>"]
license = "MIT"
readme = "README.md"
packages = [{include = "route_extractor_cli", from = "src"}]

[tool.poetry.dependencies]
python = ">=3.11"
typer = "^0.12.5"
rich = "^13.9.3"
pydantic = {version = "^2.9", features = ["dotenv"]}

[tool.poetry.dev-dependencies]
pytest = "^8.3.3"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
