[package]
name = "wasm-inspector-tui"
version = "0.1.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/cycoders/code/tree/main/wasm-inspector-tui"
description = "Interactive TUI for WebAssembly inspection"
authors = ["Arya Sianati <arya@cycoders.com>"]

[lib]
path = "src/lib.rs"

[[bin]]
name = "wasm-inspector"
path = "src/main.rs"

[dependencies]
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
crossterm = { version = "0.28", default-features = false, features = ["macros"] }
ratatui = "0.28"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
wasmparser = "0.228"

[dev-dependencies]
approx = "0.5"