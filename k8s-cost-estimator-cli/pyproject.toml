[tool.poetry]
name = "k8s-cost-estimator-cli"
version = "0.1.0"
description = "CLI to estimate Kubernetes costs from YAML manifests"
authors = ["Arya Sianati <arya@cycoders.com>"]
license = "MIT"
readme = "README.md"
repository = "https://github.com/cycoders/code/tree/main/k8s-cost-estimator-cli"
keywords = ["kubernetes", "cost", "estimator", "eks", "gke", "aks", "yaml"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Intended Audience :: System Administrators",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Topic :: System :: Clustering",
    "Topic :: Utilities",
]

[tool.poetry.dependencies]
python = ">=3.11"
click = {version = "^8.1", extras = ["all"]}
rich = "^13.7"
PyYAML = "^6.0"

[tool.poetry.group.dev.dependencies]
pytest = "^7.4"

[tool.poetry.scripts]
k8s-cost-estimator-cli = "k8s_cost_estimator_cli.main:cli"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
