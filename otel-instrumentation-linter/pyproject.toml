[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "otel-instrumentation-linter"
version = "0.1.0"
description = "Detect missing or incorrect OpenTelemetry instrumentation"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Arya Sianati"}]
requires-python = ">=3.11"
dependencies = ["rich>=13", "typer>=0.9", "astroid>=3.0", "tomli>=2.0"]

[project.scripts]
otel-instrumentation-linter = "otel_instrumentation_linter.cli:app"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"