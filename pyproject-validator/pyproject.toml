[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pyproject-validator"
version = "0.1.0"
description = "Deep validator for pyproject.toml files"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Arya Sianati"}]
requires-python = ">=3.11"
dependencies = ["tomli>=2.0.0", "rich>=13.0", "click>=8.1"]

[project.scripts]
pyproject-validator = "pyproject_validator.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/pyproject_validator"]