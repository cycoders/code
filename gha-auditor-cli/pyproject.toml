[tool.poetry]
name = "gha-auditor-cli"
version = "0.1.0"
description = "Comprehensive auditor for GitHub Actions workflows identifying security risks, best practice violations, and optimization opportunities"
authors = ["Arya Sianati <arya@cycoders.com>"]
license = "MIT"
readme = "README.md"
repository = "https://github.com/cycoders/code/tree/main/gha-auditor-cli"
keywords = ["github-actions", "linter", "auditor", "ci-cd", "security"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Topic :: Software Development :: Quality Assurance",
    "Topic :: Software Development :: Testing",
]

packages = [{include = "gha_auditor_cli", from = "src"}]

[tool.poetry.dependencies]
python = ">=3.11"
typer = {extras = ["all"], version = ">=0.9.0"}
rich = ">=13.7.0"
pyyaml = ">=6.0"

[tool.poetry.scripts]
gha-auditor-cli = "gha_auditor_cli.cli:app"

[tool.poetry.group.dev.dependencies]
pytest = ">=7.4.0"
pytest-cov = ">=4.1.0"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
