[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ratelimit-simulator"
dynamic = ["version"]
version = "0.1.0"
description = "Interactive TUI simulator for tuning rate limiting algorithms"
readme = "README.md"
requires-python = ">=3.11"
license = {file = "LICENSE"}
authors = [{name = "Arya Sianati"}]
maintainers = [{name = "Arya Sianati"}]
keywords = ["rate-limit", "api", "simulator", "tui", "cli"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
]

[project.dependencies]
typer = ">=0.12"
rich = ">=13"
textual = ">=0.40"

[project.optional-dependencies]
dev = [
    "pytest >=7.4",
    "pytest-cov",
    "hypothesis",
]

[project.scripts]
ratelimit-simulator = "ratelimit_simulator.cli:main"

[tool.pytest.ini_options]
minversion = "7.4"
addopts = "-ra --cov=src/ratelimit_simulator --cov-report=term-missing"
testpaths = ["tests"]
filterwarnings = [
    "ignore::DeprecationWarning",
]

[tool.coverage.run]
source = ["src/ratelimit_simulator"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
]