[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "process-tree-tui"
version = "0.1.0"
description = "Interactive TUI for process tree with live metrics and controls"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Arya Sianati"}]
maintainers = [{name = "Arya Sianati"}]
requires-python = ">=3.11"
classifiers = [
  "Development Status :: 5 - Production/Stable",
  "Intended Audience :: Developers",
  "Intended Audience :: System Administrators",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.11",
  "Topic :: System :: Monitoring",
  "Topic :: Software Development :: Debuggers",
  "Topic :: Utilities",
]
dependencies = [
  "psutil>=5.9.0",
  "textual>=0.82.0",
  "typer>=0.12.0",
]
[project.optional-dependencies]
dev = [
  "pytest>=7.4.0",
  "pytest-mock>=3.11.1",
  "ruff>=0.5.0",
]
[project.urls]
Homepage = "https://github.com/cycoders/code/tree/main/process-tree-tui"
Repository = "https://github.com/cycoders/code.git"
Changelog = "https://github.com/cycoders/code/blob/main/process-tree-tui/README.md"

[project.scripts]
processtree-tui = "process_tree_tui.cli:main"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "Q", "T20", "ARG", "PTH"]
ignore = ["T201"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401", "F403", "F405"]

[tool.pytest.ini_options]
minversion = "7.4"
addopts = "-ra --strict-markers --strict-config"
testpaths = ["tests"]
filterwarnings = [
    "ignore::DeprecationWarning:textual.*:",
]
markers = [
    "slow: Marks long-running tests",
    "serial: Marks tests that can't run in parallel",
]