[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "netmon-tui"
dynamic = ["version"]
description = "Real-time TUI network monitor dashboard"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Arya Sianati", email = "arya@cycoders.com"}]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3 :: 3.11",
    "Operating System :: OS Independent",
]
requires-python = ">=3.11"
dependencies = [
    "textual>=0.68.0",
    "psutil>=5.9.0",
    "typer>=0.9.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4",
    "pytest-mock>=3.11",
    "mypy>=1.8",
    "ruff>=0.5.1",
]

[project.scripts]
netmon-tui = "netmon_tui.cli:main"

[project.urls]
Homepage = "https://github.com/cycoders/code/tree/main/netmon-tui"
Repository = "https://github.com/cycoders/code"

[tool.hatch.version]
path = "src/netmon_tui/__init__.py"

[tool.pytest.ini_options]
minversion = "7.4"
addopts = "-ra --strict-markers --strict-config"
testpaths = ["tests"]
filterwarnings = [
    "ignore::DeprecationWarning:unclosed transport",
]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true

[tool.ruff]
line-length = 100
target-version = 'py311'

[tool.ruff.lint]
select = [
    "E", "F", "B", "A", "C4", "C90", "C20", "DTZ", "ISC", "INP", "G", "PGH", "PIE", "PL",
    "PD", "PT", "PS", "YTT", "ANN", "ARG", "DJ", "NPY", "PERF", "UP"
]
ignore = ["D203", "D213"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F403", "F405"]

[tool.ruff.format]
quote-style = "double"
skip-magic-trailing-comma = false
line-ending = "auto"