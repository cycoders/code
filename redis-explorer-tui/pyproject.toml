[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "redis-explorer-tui"
dynamic = ["version"]
version = "0.1.0"
description = "Interactive TUI for exploring Redis keys, memory, and slowlogs"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
  {name = "Arya Sianati"},
]
dependencies = [
  "redis>=5.0.0",
  "textual>=0.90.0",
  "typer>=0.12.3",
]
[project.scripts]
redis-explorer-tui = "redis_explorer_tui.cli:cli"

[project.optional-dependencies]
test = [
  "pytest>=8.0.0",
  "pytest-asyncio>=0.24.0",
  "fakeredis>=1.6.0",
]

[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-ra --strict-markers"
testpaths = ["tests"]
asyncio_mode = "auto"
filterwarnings = [
    "ignore::DeprecationWarning:redis.*",
]

[tool.hatch.build.targets.wheel]
packages = ["src/redis_explorer_tui"]
