[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "promql-linter-cli"
version = "0.1.0"
description = "PromQL linter and static analyzer"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Arya Sianati"}]
requires-python = ">=3.11"
dependencies = ["typer>=0.9", "rich>=13", "pyyaml>=6", "promql-parser>=0.6"]

[project.scripts]
promql-linter-cli = "promql_linter_cli.cli:app"