[build-system]
requires = ["setuptools >= 61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "k8s-netpol-sim"
version = "0.1.0"
description = "Kubernetes NetworkPolicy simulator CLI"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [{name = "Arya Sianati", email = "arya@example.com"}]
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "typer >= 0.9.0",
    "rich >= 13.0.0",
    "pydantic >= 2.0.0",
    "pyyaml >= 6.0",
    "pytest >= 7.0"
]

[project.scripts]
k8s-netpol-sim = "k8s_netpol_sim.cli:app"

[project.optional-dependencies]
dev = [
    "pre-commit",
    "rich-click",
    "pytest-mock",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests"]
addopts = "-ra --strict-markers --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning",
]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true

[[tool.mypy.overrides]]
module = "typer.*"
disable_error_code = "attr-defined"