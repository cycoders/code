[project]
name = "env-usage-scanner"
version = "0.1.0"
description = "Scans codebases for environment variable usages across languages, generates .env templates, detects unused vars, and visualizes usage graphs"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [{name = "Arya Sianati", email = "arya@example.com"}]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
]
dependencies = [
    "typer>=0.12.1",
    "rich>=13.7.1",
    "pyyaml>=6.0.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.2",
    "pytest-cov>=5.0.0",
    "ruff>=0.6.9",
]

[project.scripts]
env-usage-scanner = "env_usage_scanner.cli:app"

[project.urls]
Homepage = "https://github.com/cycoders/code/tree/main/env-usage-scanner"
Repository = "https://github.com/cycoders/code"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/env_usage_scanner"]

[tool.pytest.ini_options]
minversion = "8.3"
addopts = "-ra --strict-markers --strict-config"
testpaths = ["tests"]
filterwarnings = [
    "ignore::DeprecationWarning",
]

[tool.ruff]
line-length = 100
target-version = 'py311'

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "A", "C4", "T20", "DJ", "ARG", "PTH"]
ignore = ["T201"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401", "F403", "F405"]

[tool.ruff.format]
quote-style = "double"