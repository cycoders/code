[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "prng-quality-auditor"
version = "0.1.0"
description = "Detect weak PRNG usage in Python code"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Arya Sianati"}]
requires-python = ">=3.11"
dependencies = ["rich>=13.7", "typer>=0.12"]

[project.scripts]
prng-quality-auditor = "prng_quality_auditor.cli:app"