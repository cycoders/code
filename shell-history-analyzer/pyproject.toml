[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "shell-history-analyzer"
dynamic = ["version"]
version = "0.1.0"
description = "Analyzes bash and zsh history files for usage patterns, insights, and optimizations."
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Arya Sianati", email = "arya@example.com"}]
maintainers = [{name = "Arya Sianati", email = "arya@example.com"}]
requires-python = ">=3.11"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "typer",
    "rich",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov",
    "rich",
    "typer[all]",
    "shlex",
]

[project.scripts]
shistory = "shell_history_analyzer.cli:app"

[project.urls]
Homepage = "https://github.com/cycoders/code/tree/main/shell-history-analyzer"
Repository = "https://github.com/cycoders/code.git"

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra --cov=shell_history_analyzer --cov-report=term-missing"
testpaths = ["tests"]
