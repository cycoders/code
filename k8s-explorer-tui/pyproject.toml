[tool.poetry]
name = "k8s-explorer-tui"
version = "0.1.0"
description = "Interactive TUI dashboard for Kubernetes cluster exploration"
authors = ["Arya Sianati <arya@cycoders.com>"]
license = "MIT"
readme = "README.md"
repository = "https://github.com/cycoders/code/tree/main/k8s-explorer-tui"

[tool.poetry.dependencies]
python = ">=3.11"
textual = ">=0.68.0"
kubernetes = ">=29.0.0"
rich = ">=13.7.0"
typer = {version = ">=0.9.0", extras = ["all"]}

[tool.poetry.group.dev.dependencies]
pytest = ">=7.4.0"
pytest-mock = ">=3.11.0"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra --strict-markers"
testpaths = ["tests"]
filterwarnings = ["ignore::DeprecationWarning:kubernetes"]