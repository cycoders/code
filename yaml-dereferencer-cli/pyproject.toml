[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "yaml-dereferencer-cli"
dynamic = ["version"]
description = "CLI to dereference YAML anchors, aliases, and merges with diffs and stats"
readme = "README.md"
authors = [{name = "Arya Sianati", email = "arya@example.com"}]
license = {text = "MIT"}
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
]
requires-python = ">=3.11"
dependencies = [
    "ruamel.yaml>=0.18.5",
    "typer[all]>=0.9.0",
    "rich>=13.0.0",
]

[project.optional-dependencies]
test = [
    "pytest>=7.4",
    "pytest-mock",
]

[project.scripts]
yaml-dereferencer = "yaml_dereferencer_cli.cli:app"

[project.urls]
Homepage = "https://github.com/cycoders/code/tree/main/yaml-dereferencer-cli"
Repository = "https://github.com/cycoders/code"

[tool.pytest.ini_options]
minversion = "7.4"
addopts = "-ra --strict-markers"
testpaths = ["tests"]
filterwarnings = [
    "ignore::DeprecationWarning:ruamel",
]

[tool.ruff]
line-length = 100

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true