[tool.poetry]
name = "graphql-linter-cli"
version = "0.1.0"
description = "Lints GraphQL schema files for naming conventions, deprecation best practices, type safety issues, and design anti-patterns with rich actionable reports"
authors = ["Arya Sianati <arya@cycoders.com>"]
license = "MIT"
readme = "README.md"
repository = "https://github.com/cycoders/code/tree/main/graphql-linter-cli"
keywords = ["graphql", "linter", "schema", "audit", "cli"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Topic :: Software Development :: Quality Assurance",
    "Topic :: Software Development :: Testing",
]

[tool.poetry.dependencies]
python = ">=3.11"
click = "^8.1.7"
rich = "^13.7.1"
ariadne = "^0.23.0"

toml = {version = "^0.10.2", optional = true}

[tool.poetry.extras]
config = ["toml"]

[tool.poetry.scripts]
graphql-linter-cli = "graphql_linter_cli.cli:cli"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry.group.dev.dependencies]
pytest = "^7.4.4"
pytest-click = "^2.2"
"pytest-mock" = "^3.12.0"
pre-commit = "^3.6.0"
ruff = "^0.1.5"

[tool.ruff]
line-length = 100

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra --strict-markers"
testpaths = ["tests"]
filterwarnings = [
    "ignore::DeprecationWarning:ariadne.*",
]
markers = [
    "slow: marks tests as slow",
    "serial: marks tests that must run serially",
]

[tool.pre-commit.hooks]
ruff = {args = ["--fix"]}
