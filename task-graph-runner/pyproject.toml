[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "task-graph-runner"
version = "0.1.0"
description = "DAG-based local task runner with caching"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Arya Sianati"}]
requires-python = ">=3.11"
dependencies = ["pyyaml>=6.0", "rich>=13.0", "click>=8.1", "networkx>=3.0"]

[project.scripts]
task-graph-runner = "task_graph_runner.cli:main"