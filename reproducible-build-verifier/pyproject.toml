[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "reproducible-build-verifier"
version = "0.1.0"
description = "Detect non-determinism in builds"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Arya Sianati"}]
requires-python = ">=3.11"
dependencies = ["rich>=13.0", "click>=8.1", "python-magic>=0.4"]

[project.scripts]
reproducible-build-verifier = "reproducible_build_verifier.cli:cli"

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-cov", "mypy", "ruff"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -q"