[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "config-hot-reloader"
version = "0.1.0"
description = "Safe hot-reloading of configuration files"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Arya Sianati"}]
requires-python = ">=3.11"
dependencies = ["watchdog>=4.0", "pyyaml>=6.0", "rich>=13.0"]

[project.optional-dependencies]
dev = ["pytest", "pytest-cov", "mypy", "ruff"]

[tool.ruff]
line-length = 88