[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "otel-sampling-advisor"
version = "0.1.0"
description = "Recommend and simulate OpenTelemetry sampling strategies"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Arya Sianati"}]
requires-python = ">=3.11"
dependencies = ["click>=8.1", "rich>=13.0", "pyyaml>=6.0", "numpy>=1.24"]

[project.scripts]
otel-sampling-advisor = "otel_sampling_advisor.cli:cli"