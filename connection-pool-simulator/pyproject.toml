[tool.poetry]
name = "connection-pool-simulator"
version = "0.1.0"
description = "Simulates connection pool performance under concurrent loads to recommend optimal configurations"
authors = ["Arya Sianati <arya@cycoders.com>"]
license = "MIT"
readme = "README.md"
repository = "https://github.com/cycoders/code/tree/main/connection-pool-simulator"
keywords = ["cli", "simulation", "database", "performance", "asyncio"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
]

[tool.poetry.dependencies]
python = ">=3.11"
typer = ">=0.12"
rich = ">=13.7"
pydantic = ">=2.0"
pyyaml = ">=6.0"

[tool.poetry.dev-dependencies]
pytest = ">=7.0"
pytest-asyncio = ">=0.21"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry.scripts]
pool-sim = "connection_pool_simulator.__main__:main"