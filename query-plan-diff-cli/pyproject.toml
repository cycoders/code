[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "query-plan-diff-cli"
version = "0.1.0"
description = "Structural diffing for PostgreSQL EXPLAIN plans"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Arya Sianati"}]
requires-python = ">=3.11"
dependencies = ["rich>=13.7", "typer>=0.9", "psycopg[binary]>=3.1"]

[project.scripts]
query-plan-diff-cli = "query_plan_diff_cli.cli:app"