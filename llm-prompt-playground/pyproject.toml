[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llm-prompt-playground"
version = "0.1.0"
description = "Interactive TUI playground for crafting, A/B testing, and refining LLM prompts"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [{name = "Arya Sianati", email = "arya@cycoders.com"}]
maintainers = [{name = "Arya Sianati", email = "arya@cycoders.com"}]
keywords = ["llm", "prompt", "tui", "textual", "openai", "ollama"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Topic :: Software Development :: Testing",
    "Topic :: Text Processing",
    "Typing :: Typed",
]

[project.dependencies]
textual = ">=0.68.0"
httpx = ">=0.27.0"
tiktoken = ">=0.6.0"
pydantic = ">=2.7.0"
tomlkit = ">=0.12.0"
appdirs = ">=1.4.4"
rich = ">=13.7.0"

[project.scripts]
llm-prompt-playground = "llm_prompt_playground.main:main"

[project.optional-dependencies]
test = [
    "pytest >=7.0",
    "pytest-asyncio",
    "httpx[mock]",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100

[tool.mypy]
warn_return_any = true
warn_unused_configs = true
