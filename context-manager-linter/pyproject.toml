[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "context-manager-linter"
version = "0.1.0"
description = "Detect missing context managers for resource safety"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Arya Sianati"}]
requires-python = ">=3.11"
dependencies = ["rich>=13", "libcst>=1.0", "typer>=0.9"]

[project.scripts]
context-manager-linter = "context_manager_linter.cli:app"

[tool.pytest.ini_options]
testpaths = ["tests"]
