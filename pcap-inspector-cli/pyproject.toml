[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pcap-inspector-cli"
dynamic = ["version"]
version = "0.1.0"
authors = [
  { name = "Arya Sianati", email = "arya@example.com" },
]
description = "CLI tool for streaming PCAP analysis with rich visualizations"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
classifiers = [
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
]
dependencies = [
  "typer>=0.12.0",
  "rich>=13.7.0",
  "scapy>=2.5.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=7.4.0",
]

[project.scripts]
pcap-inspector-cli = "pcap_inspector_cli.__main__:main"

[project.urls]
Homepage = "https://github.com/cycoders/code/tree/main/pcap-inspector-cli"
Repository = "https://github.com/cycoders/code.git"