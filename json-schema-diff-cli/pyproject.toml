[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "json-schema-diff-cli"
dynamic = ["version"]
description = "CLI to diff JSON Schemas for breaking changes"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
dependencies = [
  "typer",
  "rich",
]

[project.scripts]
json-schema-diff-cli = "json_schema_diff_cli.__main__:main"

[tool.pytest.ini_options]
minversion = "8.3"
addopts = "-ra --strict-markers"
testpaths = ["tests"]
filterwarnings = [
    "ignore::DeprecationWarning",
]

[tool.ruff]
line-length = 100

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true