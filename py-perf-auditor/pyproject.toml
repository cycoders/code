[build-system]
requires = ["setuptools>=64", "wheel", "setuptools-scm[toml]>=7"]
build-backend = "setuptools.build_meta"

[project]
name = "py-perf-auditor"
dynamic = ["version"]
description = "Static analyzer for Python performance pitfalls"
readme = "README.md"
license = {file = "LICENSE"}
requires-python = ">=3.11"
authors = [{name = "Arya Sianati", email = "arya@example.com"}]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
]
dependencies = [
    "rich>=13.7.0",
    "typer>=0.12.0",
]
[project.optional-dependencies]
dev = [
    "pytest>=7.4",
    "ruff>=0.1",
    "mypy>=1.8",
]
[project.scripts]
py-perf-auditor = "py_perf_auditor.cli:app"

[project.urls]
Homepage = "https://github.com/cycoders/code/tree/main/py-perf-auditor"
Repository = "https://github.com/cycoders/code.git"

[tool.setuptools_scm]
write_to = "src/py_perf_auditor/_version.py"

[tool.pytest.ini_options]
minversion = "7.4"
addopts = "-ra --strict-markers --strict-config"
testpaths = ["tests"]
filterwarnings = [
    "ignore::pytest.PytestCollectionWarning",
]
markers = [
    "slow: marks slow tests",
]

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "A", "C4", "T20", "DJ", "ARG", "PTH"]
ignore = ["B008"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401", "F403", "F405"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true

[tool.mypy.typer*]
disallow_untyped_defs = false