[tool.poetry]
name = "rollout-simulator"
version = "0.1.0"
description = "Simulates canary and blue-green deployment rollouts using historical metrics to recommend low-risk traffic shift strategies"
authors = ["Arya Sianati <arya@cycoders.com>"]
license = "MIT"
readme = "README.md"
packages = [{include = "rollout_simulator", from = "src"}]

[tool.poetry.dependencies]
python = ">=3.11"
typer = {extras = ["all"], version = "^0.12.0"}
rich = "^13.7.1"
pydantic = "^2.8.2"
numpy = "^2.1.1"

[tool.poetry.scripts]
rollout-simulator = "rollout_simulator.cli:app"

[tool.poetry.group.dev.dependencies]
pytest = "^8.3.2"
pytest-cov = "^5.0.0"

[build-system]
requires = ["poetry-core>=1.8.0"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
minversion = "8.3"
addopts = "-ra --cov=src/rollout_simulator --cov-report=term-missing"
testpaths = ["tests"]
