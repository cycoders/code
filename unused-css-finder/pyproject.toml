[build-system]
requires = ["setuptools>=61", "wheel", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "unused-css-finder"
dynamic = ["version"]
version = "0.1.0"
description = "CLI to detect and purge unused CSS rules by matching against HTML files"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Operating System :: OS Independent",
]
authors = [{name = "Arya Sianati", email = "arya@cycoders.com"}]
dependencies = [
    "BeautifulSoup4>=4.12.0",
    "lxml>=5.0.0",
    "cssutils>=2.9.0",
    "cssselect>=1.2.0",
    "typer>=0.12.0",
    "rich>=13.7.0",
]

[project.optional-dependencies]
test = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "typer[all]",
]

[project.scripts]
unused-css-finder = "unused_css_finder.cli:app"

[project.urls]
Homepage = "https://github.com/cycoders/code/tree/main/unused-css-finder"
Repository = "https://github.com/cycoders/code"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools_scm]
write_to = "src/unused_css_finder/_version.py"