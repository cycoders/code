patterns:
  - name: python-env
    regex: 'os\.getenv\s*\(\s*["\']([^"\']+)["\']\s*\)'
    langs: [python]
    capture_group: 1
  - name: python-config-get
    regex: '(config|settings)\.get\s*\(\s*["\']([^"\']+)["\']'
    langs: [python]
    capture_group: 2
  - name: ld-py-variation
    regex: 'ldclient.*\.variation\s*\(\s*["\']([^"\']+)["\']'
    langs: [python]
    capture_group: 1
  - name: js-env
    regex: 'process\.env\[["\']([^"\']+)["\']\]'
    langs: [js]
    capture_group: 1
  - name: js-ff
    regex: '(FF|flags|featureFlags)\.isEnabled\s*\(\s*["\']([^"\']+)["\']'
    langs: [js]
    capture_group: 2
exts:
  python: [.py]
  js: [.js, .ts, .jsx, .tsx]
