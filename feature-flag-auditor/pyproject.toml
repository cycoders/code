[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "feature-flag-auditor"
dynamic = ["version"]
version = "0.1.0"
description = "Feature flag usage auditor for codebases"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
  {name = "Arya Sianati", email = "arya@cycoders.com"},
]
dependencies = [
  "typer==0.12.5",
  "rich==13.7.1",
  "pydantic==2.8.2",
  "pyyaml==6.0.2",
  "pathspec==0.12.1",
]

[project.optional-dependencies]
dev = [
  "pytest>=7.4",
  "pytest-cov",
  "black",
  "ruff",
]

[project.scripts]
feature-flag-auditor = "feature_flag_auditor.cli:main"

[tool.pytest.ini_options]
minversion = "7.4"
testpaths = ["tests"]
addopts = "-ra --strict-markers --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning",
]

[tool.coverage.run]
source = ["src", "tests"]
omit = [
    "*/tests/*",
    "*/__init__.py",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
