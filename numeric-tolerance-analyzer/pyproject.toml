[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "numeric-tolerance-analyzer"
version = "0.1.0"
description = "Recommend safe floating-point tolerances for tests"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Arya Sianati"}]
requires-python = ">=3.11"
dependencies = ["libcst>=1.2", "rich>=13", "click>=8.1", "typing-extensions>=4.9"]

[project.scripts]
numeric-tolerance-analyzer = "numeric_tolerance_analyzer.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
