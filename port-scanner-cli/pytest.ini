[tool:pytest]
addopts = "-ra -q --strict-markers --strict-config"
testpaths = [
    "tests",
]
filterwarnings = [
    "ignore::DeprecationWarning:.*socket:",
    "ignore::PendingDeprecationWarning",
]

testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"