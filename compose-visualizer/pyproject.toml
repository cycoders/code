[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "compose-visualizer"
dynamic = ["version"]
version = "0.1.0"
description = "Visualizes and audits Docker Compose files with Mermaid graphs and Rich tables"
authors = [{name = "Arya Sianati", email = "arya@example.com"}]
readme = "README.md"
license = {file = "LICENSE"}
requires-python = ">=3.11"
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
]
dependencies = [
    "typer>=0.12.0",
    "rich>=13.7.0",
    "pydantic>=2.0.0",
    "PyYAML>=6.0.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
]

[project.scripts]
compose-visualizer = "compose_visualizer.main:app"

[tool.hatch.version]
path = "src/compose_visualizer/__init__.py"

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra --strict-markers"
testpaths = ["tests"]
filterwarnings = [
    "ignore::pytest.PytestCollectionWarning:",
]
markers = [
    "slow: marks tests as slow",
    "serial: marks tests that must run serially",
]

[tool.pytest.ini_options.basenames]
test = ["test_*.py", "*_test.py"]
