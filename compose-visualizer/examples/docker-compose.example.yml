version: "3.8"

services:
  db:
    image: postgres:15
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready"]

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  api:
    image: myapp/api
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    networks:
      - default

  frontend:
    image: myapp/frontend
    depends_on:
      - api
    ports:
      - "3000:3000"

networks:
  default:

volumes:
  pgdata:
