[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "context-propagation-auditor"
version = "0.1.0"
description = "Audit context propagation in async Python code"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
dependencies = ["libcst>=1.2", "rich>=13.0", "typer>=0.9"]

[project.scripts]
context-propagation-auditor = "context_propagation_auditor.cli:app"