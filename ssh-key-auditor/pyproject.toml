[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ssh-key-auditor"
dynamic = ["version"]
version = "0.1.0"
description = "Comprehensive CLI auditor for local SSH keys"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "typer >= 0.9.0",
    "rich >= 13.0.0",
    "cryptography >= 42.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest >= 7.0.0",
    "pytest-mock",
    "ruff",
    "black",
]

[project.scripts]
ssh-key-auditor = "ssh_key_auditor.cli:main"

[project.urls]
Homepage = "https://github.com/cycoders/code/tree/main/ssh-key-auditor"
Repository = "https://github.com/cycoders/code.git"

[tool.hatch.version]
path = "src/ssh_key_auditor/__init__.py"
[tool.ruff]
line-length = 100

[tool.black]
line-length = 100