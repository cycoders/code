[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "thread-safety-linter"
version = "0.1.0"
description = "Static analysis for thread safety in Python"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
dependencies = ["rich>=13.7", "typer>=0.9"]

[project.scripts]
thread-safety-linter = "thread_safety_linter.cli:app"

[tool.pytest.ini_options]
testpaths = ["tests"]
