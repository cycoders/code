[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "x509-chain-checker"
dynamic = ["version"]
description = "Offline X.509 certificate chain validator with rich diagnostics"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [{name = "Arya Sianati", email = "arya@example.com"}]
maintainers = [{name = "Arya Sianati", email = "arya@example.com"}]
keywords = ["cert", "x509", "tls", "security", "validator"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Topic :: Security",
    "Topic :: Software Development :: Testing",
]
dependencies = [
    "cryptography>=43.0.1",
    "certifi>=2024.8.30",
    "typer[all]>=0.12.1",
    "rich>=13.7.1",
    "pydantic>=2.9.2",
]

[project.optional-dependencies]
dev = ["pytest>=8.3.3"]

[project.scripts]
x509-chain-checker = "x509_chain_checker.__main__:main"

[project.urls]
Homepage = "https://github.com/cycoders/code/tree/main/x509-chain-checker"
Repository = "https://github.com/cycoders/code"
Changelog = "https://github.com/cycoders/code/blob/main/x509-chain-checker/CHANGELOG.md"

[tool.hatch.version]
path = "src/x509_chain_checker/__init__.py"