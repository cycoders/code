[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "git-blame-tui"
dynamic = ["version"]
description = "Interactive TUI for git blame with navigation, diffs, and search"
readme = "README.md"
license = {file = "LICENSE"}
requires-python = ">=3.11"
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
]
dependencies = [
    "textual>=0.80.0",
    "gitpython>=3.1.40",
    "typer>=0.12.5",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4",
    "pytest-cov>=4.0",
    "ruff>=0.1.0",
]

[project.scripts]
git-blame-tui = "git_blame_tui.cli:main"

[tool.pytest.ini_options]
minversion = "7.4"
testpaths = ["tests"]
addopts = "-ra --cov=src/git_blame_tui --cov-report=term-missing"

[tool.ruff]
target-version = 'py311'
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "B", "Q", "I", "N", "UP", "W", "ARG", "P", "C", "DJ", "BLE", "T20"]
ignore = ["E501"]

[project.urls]
Homepage = "https://github.com/cycoders/code/tree/main/git-blame-tui"
Repository = "https://github.com/cycoders/code.git"
Changelog = "https://github.com/cycoders/code/blob/main/git-blame-tui/CHANGELOG.md"