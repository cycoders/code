[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "dep-upgrade-dryrun"
dynamic = ["version"]
description = "Simulates dependency upgrades to preview lockfile changes, semver risks, and size impacts"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [{name = "Arya Sianati", email = "arya@cycoders.com"}]
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "typer",
    "rich",
    "packaging",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4",
]

[project.scripts]
upgrade-dryrun = "upgrade_dryrun.cli:main"

[project.urls]
Homepage = "https://github.com/cycoders/code/tree/main/dep-upgrade-dryrun"
Repository = "https://github.com/cycoders/code.git"
Changelog = "https://github.com/cycoders/code/blob/main/dep-upgrade-dryrun/CHANGELOG.md"
