[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "log-schema-inferrer"
version = "0.1.0"
description = "Infer structured schemas from unstructured logs and generate parsers"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
dependencies = ["typer>=0.9", "rich>=13", "regex>=2023"]

[project.scripts]
log-schema-inferrer = "log_schema_inferrer.cli:app"