[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "exception-graph-cli"
version = "0.1.0"
description = "Build exception propagation graphs for Python codebases"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Arya Sianati"}]
requires-python = ">=3.11"
dependencies = [
  "typer>=0.9.0",
  "rich>=13.0.0",
  "networkx>=3.0",
  "astroid>=3.0.0",
]

[project.scripts]
exception-graph-cli = "exception_graph_cli.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/exception_graph_cli"]
