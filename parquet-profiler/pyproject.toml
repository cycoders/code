[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "parquet-profiler"
dynamic = ["version"]
version = "0.1.0"
description = "High-performance CLI for profiling Parquet files"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Arya Sianati", email = "arya@example.com"}]
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "pyarrow>=14.0.0",
    "typer[all]",
    "rich",
    "tqdm",
]
requires-python = ">=3.11"
[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov",
    "ruff",
    "mypy",
]
[project.scripts]
parquet-profiler = "parquet_profiler.cli:main"

[tool.hatch.version]
path = "src/parquet_profiler/__init__.py"

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.mypy]
