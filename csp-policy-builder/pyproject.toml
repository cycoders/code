[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "csp-policy-builder"
dynamic = ["version"]
version = "0.1.0"
description = "Scans websites to generate optimal Content Security Policy headers"
readme = "README.md"
requires-python = ">=3.11"
license = {file = "LICENSE"}
authors = [{name = "Arya Sianati", email = "arya@cycoders.com"}]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
]
dependencies = [
    "typer[all]",
    "rich>=13.7.1",
    "requests>=2.32.3",
    "beautifulsoup4>=4.12.3",
    "lxml>=5.2.1",
    "pydantic>=2.7.4",
    "pyyaml>=6.0.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.2.1",
    "pytest-mock>=3.14.0",
    "pytest-cov>=5.0.0",
    "black>=24.4.2",
    "mypy>=1.10.0",
    "pre-commit>=3.7.1",
]

[project.scripts]
csp-policy-builder = "csp_policy_builder.cli:app"

[project.urls]
Homepage = "https://github.com/cycoders/code/tree/main/csp-policy-builder"
Repository = "https://github.com/cycoders/code.git"

[tool.black]
target-version = ['py311']

[tool.mypy]
disallow_untyped_defs = true
warn_return_any = true
warn_unused_ignores = false

[tool.pytest.ini_options]
minversion = "8.2"
addopts = "-ra --strict-markers --strict-config"
testpaths = ["tests"]
filterwarnings = [
    "ignore::DeprecationWarning:requests",
]

[tool.coverage.run]
source = ["src"]
branch = true
omit = [
    "*__init__.py",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
