[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cron-explainer"
version = "0.1.0"
description = "Human-readable cron parser with timezone-aware scheduling"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
dependencies = ["typer>=0.9", "rich>=13", "python-dateutil>=2.8", "pytz>=2024.1"]

[project.scripts]
cron-explainer = "cron_explainer.cli:app"