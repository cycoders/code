[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "gc-log-analyzer"
version = "0.1.0"
description = "GC log analyzer and tuning advisor"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
authors = [{name = "Arya Sianati"}]

[project.scripts]
gc-log-analyzer = "gc_log_analyzer.cli:main"