[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pickle-auditor-cli"
version = "0.1.0"
description = "Detect unsafe Python deserialization"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Arya Sianati"}]
requires-python = ">=3.11"
dependencies = ["rich>=13.7", "libcst>=1.2", "typer>=0.9", "tomli>=2.0"]

[project.scripts]
pickle-auditor-cli = "pickle_auditor_cli.cli:app"