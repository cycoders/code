[build-system]
requires = ["setuptools>=65.5.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "symbol-renamer-cli"
version = "0.1.0"
description = "CLI to safely rename symbols in Python files using libcst"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{name = "Arya Sianati"}]
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "libcst>=1.3.0",
    "rich>=13.7.0",
    "typer>=0.12.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4",
    "black[jupyter]",
    "mypy",
    "pytest-xdist",
]

[project.scripts]
symbol-renamer-cli = "symbol_renamer_cli.cli:main"

[project.urls]
Homepage = "https://github.com/cycoders/code/tree/main/symbol-renamer-cli"
Repository = "https://github.com/cycoders/code"

[tool.black]
line-length = 88

target-version = ['py311']

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true

[[tool.mypy.overrides]]
module = "typer.*"
ignore_missing_imports = true

[tool.pytest.ini_options]
minversion = "7.4"
addopts = "-ra -q --strict-markers"
testpaths = ["tests"]
filterwarnings = [
    "ignore::DeprecationWarning:rich.*",
]
markers = [
    "slow: slow tests",
]