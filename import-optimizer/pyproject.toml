[build-system]
requires = ["setuptools>=61.0", "wheel", "libcst>=1.3.0"]
build-backend = "setuptools.build_meta"

[project]
name = "import-optimizer"
dynamic = ["version"]
description = "Automatically organizes Python imports: removes unused, groups/sorts with LibCST safety."
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [{name = "Arya Sianati"}]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
]
dependencies = [
    "libcst>=1.3.0",
    "rich>=13.7.0",
    "typer[all]>=0.9.0",
    "pathspec>=0.12.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "black[jupyter]",
    "mypy",
    "ruff",
]

[project.scripts]
import-optimizer = "import_optimizer.cli:main"

[project.urls]
Homepage = "https://github.com/cycoders/code/tree/main/import-optimizer"
Repository = "https://github.com/cycoders/code.git"

[tool.black]
target-version = ['py311']

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true

[tool.pytest.ini_options]
minversion = "7.4"
addopts = "-ra --strict-markers"
testpaths = ["tests"]
filterwarnings = [
    "ignore::DeprecationWarning.*typer.*",
]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "B", "Q", "I", "N", "ERA", "SIM"]
ignore = ["B008"]

[tool.coverage.run]
source = ["src", "tests"]
omit = ["*/__init__.py"]

[tool.coverage.report]
show_missing = true
skip_covered = false