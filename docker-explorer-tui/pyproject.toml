[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "docker-explorer-tui"
dynamic = ["version"]
description = "Interactive TUI for real-time Docker container monitoring and management"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [{name = "Arya Sianati", email = "arya@cycoders.com"}]
maintainers = [{name = "Arya Sianati", email = "arya@cycoders.com"}]
keywords = ["docker", "tui", "textual", "monitoring", "cli"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: System :: Monitoring",
    "Topic :: Utilities",
]
dependencies = [
    "textual >= 0.48.0",
    "docker >= 7.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest >= 7.4.0",
    "pytest-asyncio >= 0.23.0",
    "pytest-mock >= 3.11.1",
]

[project.scripts]
docker-explorer-tui = "docker_explorer_tui.main:run_app"

[project.urls]
Homepage = "https://github.com/cycoders/code/tree/main/docker-explorer-tui"
Repository = "https://github.com/cycoders/code"

[tool.hatch.version]
path = "src/docker_explorer_tui/__init__.py"

[tool.pytest.ini_options]
minversion = "7.4"
addopts = "-ra --strict-markers --strict-config"
testpaths = ["tests"]
filterwarnings = [
    "ignore::DeprecationWarning:docker",
]
asyncio_mode = "auto"

[tool.coverage.run]
source = ["src"]

[tool.coverage.report]
show_missing = true
skip_covered = false