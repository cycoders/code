[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "compression-benchmarker"
version = "0.1.0"
description = "Benchmark compression algorithms to find optimal size/speed tradeoffs"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
  {name = "Arya Sianati", email = "arya@cycoders.com"},
]
classifiers = [
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
]
dependencies = [
  "typer >= 0.9.0",
  "rich >= 13.0.0",
  "brotli",
  "zstandard",
  "lz4",
]
[project.optional-dependencies]
dev = [
  "pytest >= 7.4",
  "black",
  "mypy",
]
[project.scripts]
compression-benchmarker = "compression_benchmarker.cli:app"

[project.urls]
Homepage = "https://github.com/cycoders/code/tree/main/compression-benchmarker"
Repository = "https://github.com/cycoders/code.git"
