[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "traceroute-visualizer"
version = "0.1.0"
dynamic = ["version"]
description = "Visualizes traceroute results with rich tables, histograms, ASN info, and SVG."
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [{name = "Arya Sianati"}]
maintainers = [{name = "Arya Sianati"}]
keywords = ["network", "traceroute", "visualizer", "cli", "debugging"]
classifiers = [
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Operating System :: OS Independent",
]
dependencies = [
  "typer >= 0.12.0",
  "rich >= 13.0.0",
]

[project.optional-dependencies]
dev = [
  "pytest >= 7.0",
  "pytest-mock",
  "ruff",
  "black",
]

[project.scripts]
traceroute-visualizer = "traceroute_visualizer.main:cli"

[tool.hatch.version]
path = "src/traceroute_visualizer/__init__.py"

[tool.ruff]
line-length = 100

[tool.black]
line-length = 100