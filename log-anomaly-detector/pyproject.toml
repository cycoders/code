[tool.poetry]
name = "log-anomaly-detector"
version = "0.1.0"
description = "Detects statistical anomalies in structured JSONL logs using Z-score, IQR, and modified Z-score"
authors = ["Arya Sianati <arya@cycoders.com>"]
license = "MIT"
readme = "README.md"
repository = "https://github.com/cycoders/code/tree/main/log-anomaly-detector"
keywords = ["logs", "anomaly-detection", "cli", "debugging", "pandas", "monitoring"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Debuggers",
    "Topic :: System :: Monitoring",
    "Typing :: Typed",
]

[tool.poetry.dependencies]
python = ">=3.11"
typer = ">=0.12.3"
rich = ">=13.7.1"
pydantic = ">=2.5.2"
pandas = ">=2.1.4"
numpy = ">=1.26.4"
scipy = ">=1.13.0"
pyyaml = ">=6.0.1"

[tool.poetry.group.dev.dependencies]
pytest = ">=8.0.0"
pytest-cov = ">=5.0.0"
ruff = ">=0.5.0"
mypy = ">=1.10.0"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.ruff]
line-length = 100

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra --strict-markers --tb=short"
testpaths = ["tests"]
