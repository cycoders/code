[tool.pytest.ini_options]
addopts = "-ra -q --strict-markers"
testpaths = ["tests"]
minversion = "8.0"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "semantic-diff-cli"
dynamic = ["version"]
description = "Clean semantic diffs ignoring formatting noise"
readme = "README.md"
license = {file = "LICENSE"}
authors = [{name = "Arya Sianati", email = "arya@cycoders.com"}]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3.11",
  "Topic :: Software Development :: Testing",
  "Topic :: Utilities",
]
requires-python = ">=3.11"
dependencies = [
  "typer==0.12.5",
  "rich==13.9.3",
  "GitPython==3.1.43",
  "black==24.8.0",
]

[project.optional-dependencies]
dev = [
  "pytest==8.3.3",
  "pytest-mock==3.14.0",
]

[project.scripts]
semantic-diff-cli = "semantic_diff_cli.cli:app"