[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "latency-budget-allocator"
version = "0.1.0"
description = "Allocate and validate per-hop latency budgets for SLO compliance"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Arya Sianati"}]
requires-python = ">=3.11"
dependencies = ["click>=8.1", "pyyaml>=6.0", "numpy>=1.24", "scipy>=1.10", "rich>=13.0"]

[project.scripts]
latency-budget-allocator = "latency_budget_allocator.cli:cli"