[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "orm-nplus1-detector"
version = "0.1.0"
description = "N+1 query detector for ORMs"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
dependencies = ["rich>=13", "click>=8.1", "sqlparse>=0.4"]

[project.scripts]
orm-nplus1-detector = "orm_nplus1_detector.cli:main"