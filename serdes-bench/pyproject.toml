[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "serdes-bench"
dynamic = ["version"]
description = "SerDes benchmarking CLI for JSON, MessagePack, CBOR, etc."
readme = "README.md"
requires-python = ">=3.11"
license = {file = "LICENSE"}
authors = [{name = "Arya Sianati"}]
classifiers = [
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Topic :: Software Development :: Testing",
  "Topic :: Utilities",
]

[project.dependencies]
typer = ">=0.12.0"
rich = ">=13.7.0"
pydantic = ">=2.5.0"
orjson = ">=3.9.0"
msgpack = ">=1.0.0"
cbor2 = ">=5.5.0"
ujson = ">=5.10.0"

[project.optional-dependencies.dev]
dev = [
  "pytest >=7.4.0",
  "rich-click >=1.0.0",
  "ruff >=0.4.0",
]

[project.scripts]
serdes-bench = "serdes_bench.cli:app"

[project.urls]
Homepage = "https://github.com/cycoders/code/tree/main/serdes-bench"
Repository = "https://github.com/cycoders/code.git"
