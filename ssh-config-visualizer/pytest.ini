[tool:pytest]
addopts = "-ra -q --strict-markers --strict-config"
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
filterwarnings = [
    "ignore::DeprecationWarning:paramiko.*",
]

[coverage:run]
source = src/ssh_config_visualizer
omit = */__init__.py