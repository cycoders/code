[tool.poetry]
name = "password-strength-simulator"
version = "0.1.0"
description = "CLI to estimate realistic offline password cracking times"
authors = ["Arya Sianati <arya@cycoders.com>"]
readme = "README.md"
repository = "https://github.com/cycoders/code/tree/main/password-strength-simulator"

[tool.poetry.dependencies]
python = ">=3.11"
typer = ">=0.12.3"
rich = ">=13.7.1"
bcrypt = ">=4.1.3"
argon2-cffi = ">=23.1.0"
passlib = {version = ">=1.7.4", extras = ["argon2", "bcrypt", "scrypt"]}

[tool.poetry.group.dev.dependencies]
pytest = ">=7.4.0"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers --strict-config"

[project]
name = "password-strength-simulator"
version = "0.1.0"
description = "Password cracking time estimator CLI"
readme = "README.md"