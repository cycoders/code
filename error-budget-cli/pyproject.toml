[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "error-budget-cli"
version = "0.1.0"
description = "Error budget calculator and SLO burn rate analyzer"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Arya Sianati"}]
requires-python = ">=3.11"
dependencies = ["click>=8.1", "rich>=13.0", "pydantic>=2.0"]

[project.scripts]
error-budget-cli = "error_budget_cli.cli:cli"