[tool.poetry]
name = "unicode-picker-tui"
version = "0.1.0"
description = "Interactive TUI for browsing, searching, and copying Unicode characters"
authors = ["Arya Sianati <arya@cycoders.com>"]
license = "MIT"
readme = "README.md"
repository = "https://github.com/cycoders/code/tree/main/unicode-picker-tui"
keywords = ["unicode", "tui", "textual", "cli", "terminal", "picker"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.11",
    "Topic :: Text Processing :: Fonts",
    "Topic :: Utilities",
]

[tool.poetry.dependencies]
python = ">=3.11"
textual = ">=0.80.0"
pyperclip = ">=1.9.0"
rapidfuzz = ">=3.10.0"

[tool.poetry.group.dev.dependencies]
pytest = ">=8.0"
pytest-cov = ">=5.0"

[tool.poetry.scripts]
unicode-picker-tui = "unicode_picker_tui.main:run"

[build-system]
requires = ["poetry-core>=1.8.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry.group.textual-dev]
optional = true
dependencies = [
  "textual-devtools = {extras = ['themes']}"
]

[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-ra --cov=unicode_picker_tui --cov-report=term-missing --cov-report=html"
testpaths = ["tests"]
filterwarnings = [
    "ignore::DeprecationWarning:textual.*",
]
markers = [
    "slow: Tests that take a long time to run",
]