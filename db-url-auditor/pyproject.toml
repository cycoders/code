[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "db-url-auditor"
version = "0.1.0"
description = "Audit database connection URLs for security and correctness"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Arya Sianati"}]
requires-python = ">=3.11"
dependencies = ["click>=8.1", "rich>=13.0", "pydantic>=2.0"]

[project.scripts]
db-url-auditor = "db_url_auditor.cli:cli"