[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "grpc-reflection-cli"
version = "0.1.0"
description = "Inspect live gRPC services via reflection"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
dependencies = [
  "grpcio>=1.60",
  "grpcio-reflection>=1.60",
  "typer>=0.9",
  "rich>=13.7",
  "pydantic>=2.5",
]

[project.scripts]
grpc-reflection-cli = "grpc_reflection_cli.cli:app"