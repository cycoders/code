[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "reachability-scanner"
version = "0.1.0"
description = "Statically determine reachable vulnerable code paths"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Arya Sianati"}]
requires-python = ">=3.11"
dependencies = ["typer>=0.9", "rich>=13", "networkx>=3.2"]

[project.scripts]
reachability-scanner = "reachability_scanner.cli:app"