[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "trace-analyzer-cli"
dynamic = ["version"]
description = "High-fidelity CLI analyzer for Jaeger and OpenTelemetry trace JSON exports"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
]
dependencies = [
    "typer>=0.12.0",
    "rich>=13.0.0",
    "pandas>=2.0.0",
    "plotly>=5.0.0",
    "pydantic>=2.0.0",
]
[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "black>=24.0.0",
    "mypy>=1.0.0",
]
[project.scripts]
trace-analyzer-cli = "trace_analyzer_cli.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers --strict-config"
filterwarnings = [
    "ignore::PendingDeprecationWarning:pytest",
]

[tool.coverage.run]
source = ["src"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true

[[tool.mypy.overrides]]
module = "plotly.*"
disable_error_code = ["attr-defined"]

[project.urls]
Homepage = "https://github.com/cycoders/code/tree/main/trace-analyzer-cli"
Repository = "https://github.com/cycoders/code.git"
