[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "review-checklist-cli"
dynamic = ["version"]
description = "Generate actionable code review checklists from git diffs"
readme = "README.md"
requires-python = ">=3.11"
license = {file = "LICENSE"}
authors = [
  {name = "Arya Sianati", email = "arya@cycoders.com"},
]
classifiers = [
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
]
dependencies = [
  "typer >= 0.9.0",
  "rich >= 13.7.0",
]
[project.optional-dependencies]
dev = [
  "pytest >= 7.4.0",
  "pytest-cov >= 4.1.0",
  "ruff",
  "black",
]
[project.scripts]
review-checklist-cli = "review_checklist_cli.cli:app"

[project.urls]
Homepage = "https://github.com/cycoders/code/tree/main/review-checklist-cli"
Repository = "https://github.com/cycoders/code"

[tool.hatch.version]
path = "src/review_checklist_cli/__init__.py"

[tool.pytest.ini_options]
minversion = "7.4"
testpaths = ["tests"]
addopts = "-ra --strict-markers"
filterwarnings = [
    "ignore::DeprecationWarning",
]
testpaths = [
    "tests",
]

[tool.ruff]
line-length = 100
target-version = 'py311'

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "Q", "ARG", "PYC", "C4", "ERA", "PD", "PGH", "PL", "RSE", "RUF", "SIM"]
ignore = ["E501"]

[tool.black]
line-length = 100
target-version = ['py311']