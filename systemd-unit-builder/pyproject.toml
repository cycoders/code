[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "systemd-unit-builder"
version = "0.1.0"
description = "Generate hardened systemd units from YAML"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
dependencies = ["PyYAML>=6.0", "pydantic>=2.0", "click>=8.1", "rich>=13.0"]

[project.scripts]
systemd-unit-builder = "systemd_unit_builder.cli:main"